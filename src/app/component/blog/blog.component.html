<div class="blog-page">

  <!-- HERO -->
  <section class="hero">
    <h1>AhmedHub Blog</h1>
    <p>Smart shopping tips & online earning guides</p>

    <div class="hero-btns">
      <button class="btn primary" routerLink="/shop" >Explore Products</button>
      <button class="btn secondary">Start Selling</button>
    </div>
  </section>

  <!-- FEATURED -->
  <section class="featured">
    <img [src]="featuredPost.image" alt="">
    <div class="featured-content">
      <h2>{{ featuredPost.title }}</h2>
      <p>{{ featuredPost.description }}</p>
      <button class="btn primary" routerLink="/how-to-start">Read More</button>
    </div>
  </section>

  <!-- CATEGORIES -->
  <section class="categories">
    <h3>Categories</h3>
    <div class="category-list">
      <span *ngFor="let cat of categories">{{ cat }}</span>
    </div>
  </section>

  <!-- POSTS -->
  <section class="posts">
    <h3>Latest Articles</h3>

    <div class="post-grid">
      <div class="post-card" *ngFor="let post of posts">
        <img [src]="post.image" alt="">

        <div class="post-content">
          <span class="badge">{{ post.category }}</span>
          <h4>{{ post.title }}</h4>
          <p class="date">{{ post.date }}</p>
        </div>
      </div>
    </div>
  </section>

  <!-- SUBSCRIBE -->
  <section class="subscribe">
    <h3>Get Latest Deals & Tips</h3>
    <input type="email" placeholder="Enter your email">
    <button class="btn primary">Subscribe</button>
  </section>

</div>
