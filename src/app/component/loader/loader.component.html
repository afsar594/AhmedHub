<div class="loader-overlay" *ngIf="loaderService.loading$ | async">
  <div class="loader-box" role="status" aria-live="polite" aria-label="Loading content">
    <div class="loader-ring-wrap" aria-hidden="true">
      <div class="loader-ring"></div>
      <div class="loader-core"></div>
    </div>

    <p class="loader-title">Loading</p>
    <p class="loader-subtitle">Preparing your shopping experience</p>
  </div>
</div>
