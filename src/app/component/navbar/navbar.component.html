<nav class="navbar">


  <div class="logo">

    <button class="back-btn" 
        *ngIf="currentUrl !== '/shop'" 
        (click)="goBack()">←</button>

<img src="assets/icons/Ahmedhublogo.png" alt="logo" width="150" />
</div>


  <div class="menu-toggle" (click)="toggleMenu()">☰</div>
  
    <ul class="top-links" [class.active]="menuOpen">
    <!-- <li>
      <a
        routerLink="/home"
        (click)="setActive('home')"
        [class.active]="activeLink === 'home'"
        >Home</a
      >
    </li> -->
    <li>
      <a
        routerLink="/shop"
        (click)="setActive('shop')"
        [class.active]="activeLink === 'shop'"
        >Shop</a
      >
    </li>
    <li>
      <a
        routerLink="/aboutus"
        (click)="setActive('about')"
        [class.active]="activeLink === 'about'"
        >About Us</a
      >
    </li>
    <li>
      <a
        routerLink="/contact"
        (click)="setActive('contact')"
        [class.active]="activeLink === 'contact'"
        >Contact</a
      >
    </li>
    <li>
      <a
        routerLink="/faq"
        (click)="setActive('faq')"
        [class.active]="activeLink === 'faq'"
        >FAQ</a
      >
    </li>
    <li>
      <a
        routerLink="/shippingpolicy"
        (click)="setActive('shipping')"
        [class.active]="activeLink === 'shipping'"
        >Shipping Policy</a
      >
    </li>
    <li>
      <a
        routerLink="/terms-conditions"
        (click)="setActive('terms')"
        [class.active]="activeLink === 'terms'"
        >Terms & Conditions</a
      >
    </li>
    <li>
      <a
        routerLink="/privacypolicy"
        (click)="setActive('privacy')"
        [class.active]="activeLink === 'privacy'"
        >Privacy Policy</a
      >
    </li>
    


  <!-- baaki links -->

  <!-- 👇 Sirf jab /shop na ho -->
  <li *ngIf="currentUrl !== '/shop'" class="cart-li" (click)="navigateToCart()">
    <div class="cart-container">
      <img class="cart-icon"
        src="https://cdn-icons-png.flaticon.com/128/1170/1170678.png" />

      <span class="cart-badge" *ngIf="cartCount > 0">
        {{ cartCount }}
      </span>
    </div>
  </li>

    
  </ul>
</nav>

<!-- <div class="search-area" *ngIf="currentUrl=='/shop'"> -->

  <div class="search-area" *ngIf="router.url.includes('/shop')">
  <input
    type="text"
    placeholder="Search in AhmedHub"
    [(ngModel)]="searchTerm"
    (input)="onSearchChange()"
  />

  <img
    class="search-img"
    src="https://cdn-icons-png.flaticon.com/128/3482/3482644.png"
    alt="search"
  />

  <div class="cart-container" (click)="navigateToCart()">
    <img
      class="cart-icon"
      src="https://cdn-icons-png.flaticon.com/128/1170/1170678.png"
      alt="cart"
    />

    <!-- Badge -->
    <span class="cart-badge" *ngIf="cartCount > 0">
      {{ cartCount }}
    </span>
  </div>
</div>
