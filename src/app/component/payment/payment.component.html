<div class="payment-page">

  <!-- ALERT -->
  <div class="top-alert">
    ⚠ Please collect bank vouchers to avail bank discounts and mega deals/flash sales.
  </div>

  <div class="payment-container">

    <!-- LEFT -->
    <div class="left">

      <h3>Select Payment Method</h3>

      <div class="payment-grid">

        <!-- EASYPAISA -->
        <div class="payment-item">

          <div class="pay-box"
               (click)="select('easypaisa')"
               [class.active]="selected==='easypaisa'">

            <img src="https://crystalpng.com/wp-content/uploads/2024/10/Easypaisa-logo.png">

            <span>Easypaisa</span>
          </div>

          <div class="payment-details"
               *ngIf="selected==='easypaisa'">

            <input
              type="text"
              placeholder="Easypaisa Account Number"
              [(ngModel)]="easypaisaNumber">
<!-- 
            <button (click)="confirmOrder()">
              Pay Now
            </button> -->
          </div>
        </div>

        <!-- JAZZCASH -->
        <div class="payment-item">

          <div class="pay-box"
               (click)="select('jazzcash')"
               [class.active]="selected==='jazzcash'">

            <img src="https://crystalpng.com/wp-content/uploads/2024/12/new-Jazzcash-logo.png">

            <span>JazzCash</span>
          </div>

          <div class="payment-details"
               *ngIf="selected==='jazzcash'">

            <input
              type="text"
              placeholder="JazzCash Number"
              [(ngModel)]="jazzcashNumber">

            <!-- <button (click)="confirmOrder()">
              Pay Now
            </button> -->
          </div>
        </div>

        <!-- CARD -->
        <div class="payment-item">

          <div class="pay-box"
               (click)="select('card')"
               [class.active]="selected==='card'">

            <img src="https://png.pngtree.com/png-vector/20220706/ourmid/pngtree-debit-card-payment-png-image_5705181.png">

            <span>Credit/Debit Card</span>
          </div>

          <div class="payment-details"
               *ngIf="selected==='card'">

            <input
              type="text"
              placeholder="Card Number"
              [(ngModel)]="cardDetails.number">

            <input
              type="text"
              placeholder="Name on Card"
              [(ngModel)]="cardDetails.name">

            <input
              type="text"
              placeholder="Expiry MM/YY"
              [(ngModel)]="cardDetails.expiry">

            <input
              type="text"
              placeholder="CVV"
              [(ngModel)]="cardDetails.cvv">

            <!-- <button (click)="confirmOrder()">
              Pay Now
            </button> -->
          </div>
        </div>

        <!-- HBL -->
        <div class="payment-item">

          <div class="pay-box"
               (click)="select('hbl')"
               [class.active]="selected==='hbl'">

            <img src="https://crystalpng.com/wp-content/uploads/2024/10/HBL-logo.png">

            <span>HBL Bank</span>
          </div>

          <div class="payment-details"
               *ngIf="selected==='hbl'">

            <input
              type="text"
              placeholder="Account Number"
              [(ngModel)]="hblDetails.account">

            <input
              type="text"
              placeholder="CNIC"
              [(ngModel)]="hblDetails.cnic">

            <!-- <button (click)="confirmOrder()">
              Pay Now
            </button> -->
          </div>
        </div>

        <!-- COD -->
        <div class="payment-item">

          <div class="pay-box"
               (click)="select('cod')"
               [class.active]="selected==='cod'">

            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQhxZ2XEVrokm0HW3UqfYoFLaxGbC7rrBO63A&s">

            <span>Cash on Delivery</span>
          </div>

          <div class="payment-details"
               *ngIf="selected==='cod'">

            <!-- <p>
              Pay in cash upon delivery
            </p> -->

            <!-- <button (click)="confirmOrder()">
              Confirm Order
            </button> -->
          </div>
        </div>

        <!-- INSTALLMENT -->
        <div class="payment-item">

          <div class="pay-box"
               (click)="select('installment')"
               [class.active]="selected==='installment'">

            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRu_41dT0GF8VCa4OKpxLqm5IfFaN_85OFJfg&s">

            <span>Installment</span>
          </div>

          <div class="payment-details"
               *ngIf="selected==='installment'">

            <!-- BANK -->
            <select
              (change)="onBankChange($event)">

              <option value="">
                Select Bank
              </option>

              <option
                *ngFor="let bank of banks"
                [value]="bank.name">

                {{bank.name}}

              </option>
            </select>

            <!-- TENURE -->
            <select
              [disabled]="!selectedBank"
              (change)="onTenureChange($event)">

              <option value="">
                Select Tenure
              </option>

              <option
                *ngFor="let t of tenures"
                [value]="t">

                {{t}}

              </option>
            </select>

            <!-- CARD -->
            <div *ngIf="selectedTenure">

              <input
                type="text"
                placeholder="Card Number"
                [(ngModel)]="installmentCard.number">

              <input
                type="text"
                placeholder="Name on Card"
                [(ngModel)]="installmentCard.name">

              <input
                type="text"
                placeholder="MM/YY"
                [(ngModel)]="installmentCard.expiry">

              <input
                type="text"
                placeholder="CVV"
                [(ngModel)]="installmentCard.cvv">

              <!-- <button (click)="confirmOrder()">
                Pay Now
              </button> -->

            </div>

          </div>
        </div>

      </div>
    </div>

    <!-- RIGHT -->
    <div class="right">

      <h4>Order Summary</h4>

      <div class="summary-row">
        <span>Total</span>
        <span>Rs. {{total}}</span>
      </div>

      <button class="confirm-btn"
              (click)="confirmOrder()">

        Confirm Order

      </button>
    </div>

  </div>

  <!-- ALERT MODAL -->
  <app-alert-modal
    [visible]="showAlert"
    [title]="alertTitle"
    [message]="alertMessage"
    (onConfirm)="placeOrderConfirmed()"
    (onCancel)="showAlert=false">
  </app-alert-modal>

</div>
