<div class="terms-container">
  <h1>Terms & Conditions</h1>

  <nav class="terms-nav">
    <a *ngFor="let section of termsSections" (click)="scrollTo(section.id, $event)">
      {{ section.title }}
    </a>
  </nav>

  <div class="terms-content">
    <section *ngFor="let section of termsSections" [id]="section.id">
      <h2>{{ section.title }}</h2>
      <p *ngFor="let line of section.content.split('\n')">
        {{ line }}
      </p>
    </section>
  </div>
</div>
