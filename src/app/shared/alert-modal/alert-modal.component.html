<div class="modal-backdrop" *ngIf="visible">
  <div class="modal-container">
    <h3>{{ title }}</h3>
    <p>{{ message }}</p>
    <div class="modal-actions">
      <button class="btn btn-secondary" (click)="cancel()">Cancel</button>
      <button class="btn btn-danger" (click)="confirm()">Confirm</button>
    </div>
  </div>
</div>
